<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Adventure - 2D Retro Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- CRT Overlay for Retro Vibe -->
    <div class="crt-overlay"></div>
    <div class="scanlines"></div>

    <main class="game-container">
        <header class="ui-header">
            <div class="stats-box">
                <span class="stat">HP: <span class="value">99/99</span></span>
                <span class="stat">MP: <span class="value">50/50</span></span>
            </div>
            <div class="level-box">LV. 10</div>
        </header>

        <section class="world-scene">
            <div class="character-sprite" id="player"></div>
            <div class="interaction-prompt">Press [E] to Talk</div>
        </section>

        <footer class="dialogue-box">
            <div class="speaker-name">PENGEMBARA</div>
            <p id="dialogue-text">Selamat datang di dunia pixel! Apakah kamu siap untuk petualangan baru hari ini?</p>
            <div class="blinking-cursor">▼</div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
