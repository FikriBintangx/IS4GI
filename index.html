<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Adventure - 2D Retro Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- CRT Overlay for Retro Vibe -->
    <div class="crt-overlay"></div>
    <div class="scanlines"></div>
    <div class="glitch-flash" id="glitch-overlay"></div>

    <main class="game-container">
        <header class="ui-header">
            <div class="stats-box">
                <span class="stat">HP: <span class="value">99/99</span></span>
                <span class="stat">MP: <span class="value">50/50</span></span>
            </div>
            <div class="level-box">LV. 10</div>
        </header>

        <section class="world-scene" id="world-scene">
            <div class="scene-background" id="bg-layer"></div>
            <div class="character-bust" id="character-bust">
                <div class="bust-grid"></div>
                <img src="fikri_bust.png" alt="Fikri" id="bust-img">
            </div>
            <div class="interaction-prompt">Press [E] to Talk</div>
        </section>

        <footer class="dialogue-box">
            <div class="speaker-name">FIKRI</div>
            <p id="dialogue-text">...</p>
            <div class="controls-hint">[E] Next | [Q] Skip | [R] Restart</div>
            <div class="blinking-cursor">▼</div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
