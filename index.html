<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Adventure - 2D Retro Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- CRT Overlay for Retro Vibe -->
    <div class="crt-overlay"></div>
    <div class="scanlines"></div>
    <div class="glitch-flash" id="glitch-overlay"></div>

    <!-- Start Screen -->
    <div id="start-screen" class="start-screen">
        <div class="logo">IS4GI: THE ADVENTURE</div>
        <div class="start-prompt">PRESS ANY KEY TO START</div>
        <div class="version">v1.2.0-FINAL</div>
    </div>

    <!-- Achievement Toast -->
    <div id="achievement-container"></div>

    <main class="game-container hidden">
        <header class="ui-header">
            <div class="stats-box">
                <span class="stat">AGE: <span class="value">21</span></span>
                <div class="bgm-control" id="bgm-toggle">
                    <span class="icon">🎵</span> <span class="status">OFF</span>
                </div>
            </div>
            <div class="level-box">LV. 10</div>
        </header>

        <section class="world-scene" id="world-scene">
            <div class="scene-background" id="bg-layer"></div>
            <div id="time-filter"></div>

            <!-- Interactive Terminal (Only in Lab) -->
            <div id="interactive-terminal" class="interactive-obj hidden" title="Hack Terminal">
                <div class="terminal-spark"></div>
            </div>

            <div class="character-bust" id="character-bust">
                <div class="bust-grid"></div>
                <img src="fikri_bust.png" alt="Fikri" id="bust-img">
            </div>

            <!-- Choice Overlay -->
            <div id="choice-container" class="choice-container hidden"></div>

            <!-- Inventory Panel with Tabs -->
            <div id="inventory-overlay" class="inventory-overlay hidden">
                <div class="inventory-box">
                    <nav class="inv-nav">
                        <button class="nav-btn active" data-tab="skills">SKILLS</button>
                        <button class="nav-btn" data-tab="guilds">GUILDS</button>
                        <button id="close-inv">X</button>
                    </nav>

                    <div id="skills-tab" class="tab-content">
                        <div class="skills-grid">
                            <div class="skill-item" onclick="triggerAchievement('Frontend Knight')">
                                <div class="icon">⚛️</div>
                                <div class="label">REACT</div>
                            </div>
                            <div class="skill-item" onclick="triggerAchievement('Logic Weaver')">
                                <div class="icon">📜</div>
                                <div class="label">JS</div>
                            </div>
                            <div class="skill-item" onclick="triggerAchievement('Mobile Knight')">
                                <div class="icon">📱</div>
                                <div class="label">FLUTTER</div>
                            </div>
                        </div>
                    </div>

                    <div id="guilds-tab" class="tab-content hidden">
                        <div class="guilds-list">
                            <a href="https://github.com/FikriBintangx" target="_blank" class="guild-item">
                                <span class="icon">🐙</span> THE CODE GUILD (GITHUB)
                            </a>
                            <a href="#" target="_blank" class="guild-item">
                                <span class="icon">⚔️</span> PROFESSIONAL CIRCLE (LINKEDIN)
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="interaction-prompt">Press [E] to Talk | [I] Inventory</div>
        </section>

        <footer class="dialogue-box">
            <div class="speaker-name">FIKRI</div>
            <p id="dialogue-text">...</p>
            <div class="controls-hint">[E] Next | [Q] Skip | [R] Restart</div>
            <div class="blinking-cursor">▼</div>
        </footer>
    </main>

    <script src="script.js"></script>
    
    <!-- Hidden SVG Filter for Wavy Effect -->
    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="wavy">
            <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="1" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="25" />
        </filter>
    </svg>
</body>
</html>
